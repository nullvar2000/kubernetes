apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: hermes-agent
  namespace: hermes-agent
  labels:
    app: hermes-agent
spec:
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
  podManagementPolicy: OrderedReady
  selector:
    matchLabels:
      app: hermes-agent
  replicas: 1
  revisionHistoryLimit: 3
  serviceName: agent
  template:
    metadata:
      labels:
        app: hermes-agent
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: camofox
          image: ghcr.io/jo-inc/camofox-browser:1.11.2 # {"$imagepolicy": "flux-system:camofox-policy"}
          envFrom:
            - configMapRef:
                name: camofox-config
          ports:
            - name: http
              containerPort: 9377
              protocol: TCP
            - name: novnc
              containerPort: 6080
              protocol: TCP
          resources:
            requests:
              memory: 128Mi
              cpu: 250m
            limits:
              memory: 2Gi
            cpu: 500m
          restartPolicy: Always
      containers:
        - name: agent
          image: docker.io/nousresearch/hermes-agent:v2026.7.7 # {"$imagepolicy": "flux-system:hermes-agent-policy"}
          args:
            - gateway
            - run
          envFrom:
            - configMapRef:
                name: agent-env
          ports:
            - name: api-server
              containerPort: 8642
              protocol: TCP
            - name: dashboard
              containerPort: 9119
              protocol: TCP
            - name: webhook
              containerPort: 8644
              protocol: TCP
          resources:
            requests:
              memory: 64Mi
              cpu: 100m
            limits:
              memory: 2Gi
              cpu: 1500m
          volumeMounts:
            - name: hermes-agent-data
              mountPath: /opt/data
            - name: shm
              mountPath: /dev/shm
            - name: kube-api-access
              mountPath: /var/run/secrets/kubernetes.io/serviceaccount
              readOnly: true
        - name: code-server
          image: docker.io/linuxserver/code-server:4.127.0 # {"$imagepolicy": "flux-system:code-server-policy"}
          ports:
            - containerPort: 8443
              protocol: TCP
          env:
            - name: PUID
              value: '1000'
            - name: GUID
              value: '1000'
            - name: TZ
              value: ${GLOBAL_TZ}
            - name: DEFAULT_WORKSPACE
              value: /opt/data
          volumeMounts:
            - name: code-server-config
              mountPath: /config
            - name: hermes-agent-data
              mountPath: /opt/data
          resources:
            requests:
              memory: 128Mi
              cpu: 250m
            limits:
              memory: 2Gi
              cpu: 500m
      restartPolicy: Always
      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: "2Gi"
        - name: kube-api-access
          projected:
            sources:
              - serviceAccountToken:
                  path: token
                  expirationSeconds: 3600
              - downwardAPI:
                  items:
                    - path: namespace
                      fieldRef:
                        fieldPath: metadata.namespace
              - configMap:
                  name: kube-root-ca.crt # Talos creates this automatically                                                                                                 
                  items:
                    - key: ca.crt
                      path: ca.crt
  volumeClaimTemplates:
    - metadata:
        name: hermes-agent-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 64Gi
        storageClassName: longhorn
    - metadata:
        name: code-server-config
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 16Gi
        storageClassName: longhorn
