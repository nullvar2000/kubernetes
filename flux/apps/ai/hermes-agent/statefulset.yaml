apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: hermes-agent
  namespace: hermes-agent
  labels:
    app: hermes-agent
spec:
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
  podManagementPolicy: OrderedReady
  selector:
    matchLabels:
      app: hermes-agent
  replicas: 3
  revisionHistoryLimit: 3
  serviceName: agent
  template:
    metadata:
      labels:
        app: hermes-agent
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: agent
          image: docker.io/nousresearch/hermes-agent:v2026.5.16 # {"$imagepolicy": "flux-system:hermes-agent-policy"}
          command:
            - hermes
          args:
            - gateway
            - run
          envFrom:
            - configMapRef:
                name: agent-env
          ports:
            - name: api-server
              containerPort: 8642
              protocol: TCP
            - name: dashboard
              containerPort: 9119
              protocol: TCP
            - name: webhook
              containerPort: 8644
              protocol: TCP
          resources:
            requests:
              memory: 64Mi
              cpu: 100m
            limits:
              memory: 2Gi
              cpu: 1500m
          volumeMounts:
            - name: hermes-agent-data
              mountPath: /opt/data
            - name: shm
              mountPath: /dev/shm
      restartPolicy: Always
      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: "2Gi"
  volumeClaimTemplates:
    - metadata:
        name: hermes-agent-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 16Gi
        storageClassName: longhorn
