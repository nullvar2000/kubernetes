apiVersion: apps/v1
kind: Deployment
metadata:
  name: crw
  namespace: hermes-agent
  labels:
    app: crw
spec:
  selector:
    matchLabels:
      app: crw
  replicas: 1
  template:
    metadata:
      labels:
        app: crw
    spec:
      containers:
        - name: crw
          image: ghcr.io/us/crw:0.26.1 # {"$imagepolicy": "flux-system:crw-policy"}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /v1/
              port: http
            initialDelaySeconds: 30
            periodSeconds: 60
          resources:
            requests:
              cpu: 100m
              memory: 32M
            limits:
              cpu: 1000m
              memory: 2G
      restartPolicy: Always
