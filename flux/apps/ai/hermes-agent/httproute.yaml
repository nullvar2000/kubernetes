apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hermes-dashboard
  namespace: hermes-agent
spec:
  parentRefs:
  - name: gateway-api
    namespace: istio-gateway
  hostnames:
    - hermes.${GLOBAL_DOMAIN}
  rules:
    - matches:
      - path:
          type: PathPrefix
          value: /
      backendRefs:
      - name: hermes-dashboard
        port: 9119
