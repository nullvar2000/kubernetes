apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hermes-dashboard
  namespace: hermes-agent
spec:
  parentRefs:
  - name: gateway-api
    namespace: istio-gateway
  hostnames:
    - hermes.${GLOBAL_DOMAIN}
  rules:
    - matches:
      - path:
          type: PathPrefix
          value: /dashboard
      backendRefs:
      - name: hermes-agent
        port: 9119
    - matches:
      - path:
          type: PathPrefix
          value: /code-server
      backendRefs:
      - name: hermes-agent
        port: 8443
