---
apiVersion: v1
kind: Service
metadata:
  name:  hermes-dashboard
  namespace: hermes-agent
spec:
  selector:
    app:  hermes-agent
  type: ClusterIP
  ports:
    - name: hermes-dashboard
      port: 9119
      protocol: TCP
      targetPort: 9119
---
apiVersion: v1
kind: Service
metadata:
  name:  code-server
  namespace: hermes-agent
spec:
  selector:
    app:  hermes-agent
  type: ClusterIP
  ports:
    - name: code-server
      port: 8443
      protocol: TCP
      targetPort: 8443
