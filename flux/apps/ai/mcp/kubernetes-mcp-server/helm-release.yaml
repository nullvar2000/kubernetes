apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kubernetes-mcp-server
spec:
  interval: 1h
  releaseName: kubernetes-mcp-server
  chart:
    spec:
      chart: kubernetes-mcp-server
      version: 0.1.0
      sourceRef:
        kind: OCIRepository
        name: kubernetes-mcp-server
  values:
    ingress:
      enabled: false
    httpRoute:
      enabled: false
    service:
      type: ClusterIP
      port: 8080
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 100m
        memory: 128Mi
    rbac:
      create: true
      extraClusterRoleBindings:
        - name: cluster-admin
          roleRef:
            name: cluster-admin
            external: true
    image:
      registry: quay.io
      repository: containers/kubernetes_mcp_server
      pullPolicy: IfNotPresent