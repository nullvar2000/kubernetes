apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kubernetes-mcp-server
spec:
  parentRefs:
  - name: gateway-api
    namespace: istio-gateway
  hostnames:
    - kubernetes-mcp.${GLOBAL_DOMAIN}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: kubernetes-mcp-server
      port: 8080
