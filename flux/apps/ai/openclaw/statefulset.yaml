apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: gateway
  namespace: openclaw
  labels:
    app: openclaw-gateway
spec:
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
  podManagementPolicy: OrderedReady
  selector:
    matchLabels:
      app: openclaw-gateway
  replicas: 1
  revisionHistoryLimit: 3
  template:
    metadata:
      labels:
        app: openclaw-gateway
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: init-config
          image: busybox:1.37
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              if [ ! -f /home/node/.openclaw/openclaw.json ]; then
                cp /config/openclaw.json /home/node/.openclaw/openclaw.json
              fi
              mkdir -p /home/node/.openclaw/workspace
              if [ ! -f /home/node/.openclaw/workspace/AGENTS.md ]; then
                cp /config/AGENTS.md /home/node/.openclaw/workspace/AGENTS.md
              fi
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          resources:
            requests:
              memory: 32Mi
              cpu: 50m
            limits:
              memory: 64Mi
              cpu: 100m
          volumeMounts:
            - name: openclaw-home
              mountPath: /home/node/.openclaw
            - name: init-config
              mountPath: /config
      containers:
        - name: gateway
          image: ghcr.io/openclaw/openclaw:2026.4.23-slim # {"$imagepolicy": "flux-system:openclaw-policy"}
          command:
            - node
            - /app/dist/index.js
            - gateway
            - run
          env:
            - name: HOME
              value: /home/node
            - name: OPENCLAW_CONFIG_DIR
              value: /home/node/.openclaw
            - name: NODE_ENV
              value: production
          envFrom:
            - secretRef:
                name: openclaw-secrets
          ports:
            - name: gateway
              containerPort: 18789
              protocol: TCP
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 2Gi
              cpu: "1"
          volumeMounts:
            - name: openclaw-home
              mountPath: /home/node/.openclaw
        - name: vscode
          image: lscr.io/linuxserver/vscode:1.116.0 # {"$imagepolicy": "flux-system:vscode-policy"}
          env:
            - name: PUID
              value: '1000'
            - name: PGID
              value: '1000'
            - name: TZ
              value: America/New_York
          ports:
            - name: gateway
              containerPort: 3000
              protocol: TCP
            - name: gateway2
              containerPort: 3001
              protocol: TCP
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 2Gi
              cpu: "1"
          volumeMounts:
            - name: openclaw-home
              mountPath: /projects
            - name: vscode-config
              mountPath: /config
      restartPolicy: Always
      volumes:
        - name: init-config
          configMap:
            name: init-config
        - name: openclaw-home
          persistentVolumeClaim:
            claimName: openclaw-home
        - name: vscode-config
          persistentVolumeClaim:
            claimName: vscode-config
