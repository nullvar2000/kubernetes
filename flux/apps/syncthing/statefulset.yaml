apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: syncthing
  namespace: syncthing
  labels:
    app: syncthing
spec:
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
  podManagementPolicy: OrderedReady
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: syncthing
  serviceName: syncthing
  template:
    metadata:
      labels:
        app: syncthing
    spec:
      automountServiceAccountToken: false
      containers:
        - name: syncthing
          image: docker.io/syncthing/syncthing:2.0.16 # {"$imagepolicy": "flux-system:syncthing-policy"}
          ports:
            - name: web-ui
              containerPort: 8384
              protocol: TCP
            - name: tcp-xfers
              containerPort: 22000
              protocol: TCP
            - name: quic-xfers
              containerPort: 22000
              protocol: UDP
            - name: local-discovery
              containerPort: 21027
              protocol: UDP
          livenessProbe:
            httpGet:
              path: /rest/noauth/health
              port: web-ui
            initialDelaySeconds: 30
            periodSeconds: 60
          volumeMounts:
            - mountPath: /var/syncthing
              name: syncthing-data
              readOnly: False
          resources: {}
      restartPolicy: Always
      volumes:
        - name: syncthing-data
          persistentVolumeClaim:
            claimName: syncthing-data
