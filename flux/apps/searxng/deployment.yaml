apiVersion: apps/v1
kind: Deployment
metadata:
  name: searxng
  namespace: searxng
  labels:
    app: searxng
spec:
  selector:
    matchLabels:
      app: searxng
  replicas: 1
  template:
    metadata:
      labels:
        app: searxng
    spec:
      containers:
        - name: searxng
          image: ghcr.io/searxng/searxng:2026.3.27-265858ee2 # {"$imagepolicy": "flux-system:searxng-policy"}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 60
          volumeMounts:
            - mountPath: /etc/searxng
              name: searxng-config
              readOnly: False
            - mountPath: /var/cache/searxng
              name: searxng-cache
              readOnly: False
          resources:
            requests:
              cpu: 200m
              memory: 128M
            limits:
              cpu: 1000m
              memory: 2G
      restartPolicy: Always
      volumes:
        - name: searxng-config
          emptyDir: {}
        - name: searxng-cache
          emptyDir: {}
