apiVersion: apps/v1
kind: Deployment
metadata:
  name: searxng
  namespace: searxng
  labels:
    app: searxng
spec:
  selector:
    matchLabels:
      app: searxng
  replicas: 1
  template:
    metadata:
      labels:
        app: searxng
    spec:
      containers:
        - name: searxng
          image: ghcr.io/searxng/searxng:2026.4.29-f96ac331e # {"$imagepolicy": "flux-system:searxng-policy"}
          env:
            - name: SEARXNG_SECRET
              value: ${SEARXNG_SECRET}
            - name: SEARXNG_PORT
              value: '8080'
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 60
          volumeMounts:
            - name: searxng-settings
              mountPath: /etc/searxng/settings.yml
              subPath: settings.yml
              readOnly: True
            - name: searxng-cache
              mountPath: /var/cache/searxng
              readOnly: False
          resources:
            requests:
              cpu: 200m
              memory: 128M
            limits:
              cpu: 1000m
              memory: 2G
      restartPolicy: Always
      volumes:
        - name: searxng-settings
          configMap:
            name: searxng-settings
        - name: searxng-cache
          emptyDir: {}
