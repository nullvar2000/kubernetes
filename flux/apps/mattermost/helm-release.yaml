apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mattermost
  namespace: mattermost
spec:
  interval: 1h
  releaseName: mattermost
  chart:
    spec:
      chart: mattermost
      version: '2.7.*'
      sourceRef:
        kind: HelmRepository
        name: mattermost
  values:
    global:
      siteUrl: https://mattermost.${GLOBAL_DOMAIN}
      features:
        database:
          driver: "postgres"
          existingDatabaseSecret:
            name: postgres
            key: CONNECTION_STRING
        fileStore:
          driver: "amazons3"
          url: http://rustfs-svc.rustfs.svc.cluster.local:9000
          bucket: "mattermost-uploads"
          region: "us-east-1"
          sslEnabled: false
          existingSecret:
            name: "s3-credentials"
            accessKeyIdKey: ACCESS_KEY
            secretAccessKeyKey: SECRET_KEY
        jobserver:
          enabled: true
          resources:
            requests:
              cpu: 100m
              memory: 200Mi
            limits:
              cpu: 500m
              memory: 512Mi
    mattermostApp:
      replicaCount: 1
      ingress:
        enabled: false
