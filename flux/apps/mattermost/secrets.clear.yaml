---
apiVersion: v1
kind: Secret
metadata:
  name: postgres
  namespace: rustfs
type: Opaque
stringData:
  CONNECTION_STRING: postgres://${MATTERMOST_POSTGRES_USER}:${MATTERMOST_POSTGRES_PASSWORD}@postgres:5432/dbname?sslmode=require
  POSTGRES_DB: ${MATTERMOST_POSTGRES_DB}
  POSTGRES_USER: ${MATTERMOST_POSTGRES_USER}
  POSTGRES_PASSWORD: ${MATTERMOST_POSTGRES_PASSWORD}
---
apiVersion: v1
kind: Secret
metadata:
  name: s3-credentials
  namespace: rustfs
type: Opaque
stringData:
  ACCESS_KEY: ${MATTERMOST_S3_ACCESS_KEY}
  SECRET_KEY: ${MATTERMOST_S3_SECRET_KEY}
