---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: paperless-ngx
  labels:
    app: redis
spec:
  selector:
    matchLabels:
      app: redis
  replicas: 1
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:8.6.0
          ports:
            - containerPort: 6379
              protocol: TCP
          resources:
            resources:
            requests:
              memory: 64Mi
              cpu: 200m
            limits:
              memory: 2Gi
              cpu: 500m
      restartPolicy: Always
