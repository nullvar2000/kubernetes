apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metallb
  namespace: metallb
spec:
  interval: 1h
  releaseName: metallb
  chart:
    spec:
      chart: metallb
      version: "0.16.*"
      sourceRef:
        kind: HelmRepository
        name: metallb

  valuesFrom:
    - kind: ConfigMap
      name: helm-values
