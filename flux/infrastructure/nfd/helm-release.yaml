apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nfd
  namespace: node-feature-discovery
spec:
  interval: 1h
  releaseName: nfd
  chart:
    spec:
      chart: node-feature-discovery
      version: 0.18.3
      sourceRef:
        kind: HelmRepository
        name: nfd
  values:
    prometheus:
      enable: true
