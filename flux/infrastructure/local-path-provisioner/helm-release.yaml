apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: local-path-provisioner
  namespace: local-path-provisioner
spec:
  interval: 30m
  releaseName: local-path-provisioner
  chartRef:
    kind: HelmChart
    name: local-path-provisioner
    namespace: flux-system
  values:
    storageClass:
      name: local-path
      defaultClass: false
      defaultVolumeType: local
      reclaimPolicy: Delete
    nodePathMap:
      - node: DEFAULT_PATH_FOR_NON_LISTED_NODES
        paths:
          - /var/mnt/local-nvme
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
    nodeSelector:
      kubernetes.io/hostname: talos-w07
    tolerations:
      - key: node-role.kubernetes.io/gpu
        operator: Exists
    
      