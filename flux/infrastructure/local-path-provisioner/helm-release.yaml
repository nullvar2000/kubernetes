apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: local-path-provisioner
  namespace: local-path-provisioner
spec:
  interval: 1h
  releaseName: local-path-provisioner
  chart:
    spec:
      chart: local-path-provisioner
      version: 'v0.0.35'
      sourceRef:
        kind: HelmRepository
        name: local-path-provisioner
  values:
    storageClass:
      name: local-path
      defaultClass: false
      defaultVolumeType: local
      reclaimPolicy: Delete
    nodePathMap:
      - node: DEFAULT_PATH_FOR_NON_LISTED_NODES
        paths:
          - /var/mnt/local-nvme
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
    nodeSelector:
      kubernetes.io/hostname: talos-w07
    tolerations:
      - key: node-role.kubernetes.io/gpu
        operator: Exists
    
      