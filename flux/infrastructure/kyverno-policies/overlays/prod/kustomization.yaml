apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  # Override failure policy to enforce (not just warn) in production
  - target:
      kind: ClusterPolicy
      name: deny-latest-tag
    patch: |-
      - op: add
        path: /spec/validationFailureAction
        value: Enforce
  - target:
      kind: ClusterPolicy
      name: require-resources
    patch: |-
      - op: add
        path: /spec/validationFailureAction
        value: Enforce
