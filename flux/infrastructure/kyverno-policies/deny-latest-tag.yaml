apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: deny-latest-tag
  annotations:
    policies.kyverno.io/title: Deny Latest Tag
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >-
      Requires all containers to specify an explicit image tag
      other than ':latest'. Immutable infrastructure mandate.
spec:
  evaluation:
    admission:
      enabled: true
    background:
      enabled: true
  matchConstraints:
    resourceRules:
      - apiGroups:
          - ""
        apiVersions:
          - v1
        operations:
          - CREATE
          - UPDATE
        resources:
          - pods
  validationActions:
    - Audit
  validations:
    - expression: >-
        object.spec.containers.all(c,
          !c.image.endsWith(':latest') && (c.image.contains(':') || c.image.contains('@'))
        )
      message: "Using ':latest' tag is prohibited. Specify an explicit version."
    - expression: >-
        !has(object.spec.initContainers) || 
        object.spec.initContainers.all(c,
          !c.image.endsWith(':latest') && (c.image.contains(':') || c.image.contains('@'))
        )
      message: "Using ':latest' tag is prohibited. Specify an explicit version."
    - expression: >-
        !has(object.spec.ephemeralContainers) || 
        object.spec.ephemeralContainers.all(c,
          !c.image.endsWith(':latest') && (c.image.contains(':') || c.image.contains('@'))
        )
      message: "Using ':latest' tag is prohibited. Specify an explicit version."
