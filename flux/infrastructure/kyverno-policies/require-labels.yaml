apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: require-labels
  annotations:
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/description: Enforce the presence of required labels that identify semantic attributes of applications or Deployments.
    policies.kyverno.io/severity: medium
    policies.kyverno.io/title: Require Labels
spec:
  evaluation:
    admission:
      enabled: true
    background:
      enabled: true
  matchConstraints:
    resourceRules:
      - apiGroups:
          - ""
        apiVersions:
          - v1
        operations:
          - CREATE
          - UPDATE
        resources:
          - pods
  validationActions:
    - Audit
  validations:
    - expression: >-
        has(object.metadata.labels) && 
        'app.kubernetes.io/name' in object.metadata.labels && 
        object.metadata.labels['app.kubernetes.io/name'] != ''
      messageExpression: "'Pod ' + object.metadata.name + ' must have the label app.kubernetes.io/name with a non-empty value. Found labels: ' + (has(object.metadata.labels) ? string(object.metadata.labels) : 'none')"
    - expression: >-
        has(object.metadata.labels) && 
        'app.kubernetes.io/managed-by' in object.metadata.labels && 
        (
          object.metadata.labels['app.kubernetes.io/managed-by'] == 'flux' || 
          object.metadata.labels['app.kubernetes.io/managed-by'] == 'argocd'
        )
      messageExpression: "'Pod ' + object.metadata.name + ' must have the label app.kubernetes.io/managed-by with a value of flux or argocd. Found labels: ' + (has(object.metadata.labels) ? string(object.metadata.labels) : 'none')"
