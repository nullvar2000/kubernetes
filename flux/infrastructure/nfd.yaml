apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: nfd
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./flux/infrastructure/nfd
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-infrastructure
  postBuild:
    substituteFrom:
      - kind: Secret
        name: global-secrets
      - kind: Secret
        name: infrastructure-secrets
  decryption:
    provider: sops
    secretRef:
      name: sops-age
