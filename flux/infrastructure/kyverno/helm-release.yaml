apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kyverno
  namespace: flux-system
spec:
  interval: 1h
  releaseName: kyverno
  chart:
    spec:
      chart: kyverno
      version: "3.8.*"
      sourceRef:
        kind: HelmRepository
        name: kyverno

  valuesFrom:
    - kind: ConfigMap
      name: helm-values
