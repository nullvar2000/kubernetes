apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: kyverno

resources:
  - namespace.yaml
  - helm-repo.yaml
  - helm-release.yaml
  # - networkpolicy-egress.yaml
  # - networkpolicy-ingress.yaml

configMapGenerator:
  - name: helm-values
    files:
      - files/values.yaml
generatorOptions:
  disableNameSuffixHash: true